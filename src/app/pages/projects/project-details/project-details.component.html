<div class="details-container">

  <h2>Project Details</h2>

  <div *ngIf="loading">Loading project...</div>

  <div *ngIf="!loading && project">

    <h3>{{ project.title }}</h3>
    <p>{{ project.description }}</p>

  </div>

  <p *ngIf="!loading && !project">
    Project not found.
  </p>

</div>
